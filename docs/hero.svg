<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8bff"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="tintA" cx="0.1" cy="0" r="0.9">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tintB" cx="0.95" cy="0.1" r="0.8">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2f6bff" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- 背景卡片 -->
  <rect x="2" y="2" width="1196" height="356" rx="30" fill="#f3f6fb" stroke="#e5eaf2"/>
  <rect x="2" y="2" width="1196" height="356" rx="30" fill="url(#tintA)"/>
  <rect x="2" y="2" width="1196" height="356" rx="30" fill="url(#tintB)"/>

  <!-- 应用图标 -->
  <g filter="url(#soft)">
    <rect x="72" y="80" width="200" height="200" rx="46" fill="url(#icon)"/>
  </g>
  <rect x="121" y="117" width="102" height="126" rx="10" fill="#ffffff"/>
  <path d="M 197 117 L 223 143 L 197 143 Z" fill="#bfdbfe"/>
  <rect x="136" y="152" width="72" height="9" rx="4.5" fill="#94a3b8"/>
  <rect x="136" y="172" width="58" height="9" rx="4.5" fill="#94a3b8"/>
  <rect x="136" y="212" width="72" height="9" rx="4.5" fill="#94a3b8"/>
  <rect x="136" y="228" width="44" height="9" rx="4.5" fill="#94a3b8"/>
  <rect x="104" y="186" width="136" height="12" rx="6" fill="url(#scan)"/>

  <!-- 标题与标语 -->
  <text x="320" y="152" font-size="52" font-weight="700" fill="#0f172a">扫描王 ScanKing</text>
  <text x="320" y="198" font-size="23" fill="#64748b">免费 · 无广告 · 完全离线的文档扫描 App</text>

  <!-- 功能胶囊 第一行 -->
  <g font-size="17" font-weight="600">
    <rect x="320" y="228" width="116" height="40" rx="20" fill="#e7eeff"/>
    <text x="378" y="254" text-anchor="middle" fill="#2f6bff">自动裁边</text>
    <rect x="450" y="228" width="116" height="40" rx="20" fill="#e7eeff"/>
    <text x="508" y="254" text-anchor="middle" fill="#2f6bff">透视矫正</text>
    <rect x="580" y="228" width="116" height="40" rx="20" fill="#e7eeff"/>
    <text x="638" y="254" text-anchor="middle" fill="#2f6bff">五种滤镜</text>
    <rect x="710" y="228" width="132" height="40" rx="20" fill="#e7eeff"/>
    <text x="776" y="254" text-anchor="middle" fill="#2f6bff">导出 PDF</text>
    <rect x="856" y="228" width="170" height="40" rx="20" fill="#e7eeff"/>
    <text x="941" y="254" text-anchor="middle" fill="#2f6bff">离线中英 OCR</text>
  </g>
  <!-- 功能胶囊 第二行 -->
  <g font-size="17" font-weight="600">
    <rect x="320" y="278" width="116" height="40" rx="20" fill="#e7eeff"/>
    <text x="378" y="304" text-anchor="middle" fill="#2f6bff">证件拼页</text>
    <rect x="450" y="278" width="116" height="40" rx="20" fill="#e7eeff"/>
    <text x="508" y="304" text-anchor="middle" fill="#2f6bff">全文搜索</text>
    <rect x="580" y="278" width="150" height="40" rx="20" fill="#e7eeff"/>
    <text x="655" y="304" text-anchor="middle" fill="#2f6bff">数据不出手机</text>
  </g>

  <!-- 技术栈 -->
  <text x="1128" y="330" text-anchor="end" font-size="16" fill="#94a3b8">Rust · Tauri 2 · tract</text>
</svg>
