  <circle cx="712" cy="230" r="30" fill="#000000" stroke="#4f8bff" stroke-width="2"/>
  <polygon points="694,242 730,234 730,258 694,262" fill="#eceade"/>
  <path d="M 704 230 h 16 M 712 222 v 16" stroke="#4f8bff" stroke-width="1.6"/>
