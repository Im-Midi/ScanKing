  <path d="M 480 560 h 280 v 62 h -280 z" fill="#161b23" opacity="0.95"/>
  <rect x="496" y="576" width="54" height="30" rx="15" fill="#20252d" stroke="#2a313c"/>
  <text x="523" y="596" font-size="11" fill="#c3ccd9" text-anchor="middle">自动</text>
  <rect x="558" y="576" width="54" height="30" rx="15" fill="#20252d" stroke="#2a313c"/>
  <text x="585" y="596" font-size="11" fill="#c3ccd9" text-anchor="middle">整页</text>
  <rect x="662" y="576" width="82" height="30" rx="15" fill="url(#blue)"/>
  <text x="703" y="596" font-size="11" font-weight="650" fill="#ffffff" text-anchor="middle">下一步</text>

