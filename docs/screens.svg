    <path d="M 96 388 a 14 14 0 0 1 14 -14 h 90 a 14 14 0 0 1 14 14 v 96 h -118 z" fill="#cfd8e8"/>
    <rect x="112" y="396" width="86" height="56" rx="4" fill="#eef2f8"/>
    <rect x="120" y="408" width="52" height="5" rx="2.5" fill="#8fa0b8"/>
    <rect x="120" y="420" width="66" height="5" rx="2.5" fill="#aab6c8"/>
    <rect x="120" y="432" width="44" height="5" rx="2.5" fill="#aab6c8"/>
    <text x="107" y="507" font-size="11" font-weight="650" fill="#0f172a">身份证</text>
    <text x="107" y="523" font-size="9" fill="#7c8698">2 页 · 07-17</text>
  </g>
  <g>
    <rect x="226" y="374" width="118" height="176" rx="14" fill="#ffffff" stroke="#e5eaf2" filter="url(#soft)"/>
    <path d="M 226 388 a 14 14 0 0 1 14 -14 h 90 a 14 14 0 0 1 14 14 v 96 h -118 z" fill="#dde6d8"/>
    <rect x="246" y="398" width="78" height="6" rx="3" fill="#93a08c"/>
    <rect x="246" y="412" width="66" height="6" rx="3" fill="#a8b3a1"/>
    <rect x="246" y="426" width="78" height="6" rx="3" fill="#a8b3a1"/>
    <rect x="246" y="440" width="40" height="6" rx="3" fill="#a8b3a1"/>
