  <!-- FAB -->
  <circle cx="322" cy="606" r="26" fill="url(#blue)" filter="url(#soft)"/>
  <path d="M 322 594 v 24 M 310 606 h 24" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

