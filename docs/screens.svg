    <rect x="928" y="140" width="184" height="326" rx="6" fill="#ffffff"/>
  </g>
  <rect x="946" y="164" width="104" height="11" rx="5.5" fill="#2f6bff" opacity="0.85"/>
  <g fill="#cbd5e1">
    <rect x="946" y="192" width="148" height="7" rx="3.5"/>
    <rect x="946" y="208" width="136" height="7" rx="3.5"/>
    <rect x="946" y="224" width="148" height="7" rx="3.5"/>
    <rect x="946" y="240" width="92" height="7" rx="3.5"/>
    <rect x="946" y="268" width="148" height="7" rx="3.5"/>
    <rect x="946" y="284" width="128" height="7" rx="3.5"/>
    <rect x="946" y="300" width="148" height="7" rx="3.5"/>
    <rect x="946" y="316" width="106" height="7" rx="3.5"/>
    <rect x="946" y="344" width="148" height="7" rx="3.5"/>
    <rect x="946" y="360" width="140" height="7" rx="3.5"/>
    <rect x="946" y="376" width="88" height="7" rx="3.5"/>
    <rect x="946" y="404" width="148" height="7" rx="3.5"/>
    <rect x="946" y="420" width="120" height="7" rx="3.5"/>
  </g>
  <rect x="1054" y="150" width="48" height="17" rx="8.5" fill="#2f6bff"/>
  <text x="1078" y="162" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">已识别</text>
  <!-- 底部操作栏 -->
  <path d="M 880 566 h 280 v 56 h -280 z" fill="#10131a" opacity="0.88"/>
  <g font-size="11" fill="#dde4ee" text-anchor="middle" font-weight="600">
    <rect x="892" y="578" width="58" height="32" rx="12" fill="#ffffff" opacity="0.08"/>
    <text x="921" y="598">编辑</text>
    <rect x="958" y="578" width="58" height="32" rx="12" fill="#ffffff" opacity="0.08"/>
    <text x="987" y="598">识别</text>
    <rect x="1024" y="578" width="58" height="32" rx="12" fill="#ffffff" opacity="0.08"/>
    <text x="1053" y="598">存图</text>
    <rect x="1090" y="578" width="58" height="32" rx="12" fill="url(#blue)"/>
    <text x="1119" y="598" fill="#ffffff">分享</text>
  </g>

  <!-- 底部说明 -->
  <g font-size="16" font-weight="600" fill="#334155" text-anchor="middle">
    <text x="220" y="706">文档库 · 全文搜索</text>
    <text x="620" y="706">自动裁边 · 手动微调</text>
    <text x="1020" y="706">一键存图 · 分享微信</text>
  </g>
