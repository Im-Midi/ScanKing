    <polygon points="552,280 666,266 665,278 551,292"/>
    <polygon points="550,308 620,300 619,312 549,320"/>
    <polygon points="548,336 662,322 661,334 547,348"/>
    <polygon points="546,364 606,358 605,370 545,376"/>
