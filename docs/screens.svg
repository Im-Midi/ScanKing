<svg viewBox="0 0 1240 730" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8bff"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
    <filter id="ps" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- ============ 手机 1：文档库（浅色） ============ -->
  <g filter="url(#ps)">
    <rect x="70" y="40" width="300" height="620" rx="38" fill="#0d1117"/>
  </g>
  <rect x="80" y="50" width="280" height="600" rx="28" fill="#eef1f6"/>
  <!-- 顶栏 -->
  <path d="M 80 78 h 280 v 36 h -280 z" fill="#f8fafd" opacity="0.9"/>
  <rect x="80" y="113" width="280" height="1" fill="#e5eaf2"/>
  <text x="100" y="102" font-size="17" font-weight="700" fill="#0f172a">扫描王</text>
  <path d="M 341 88 a 8 8 0 1 0 0 12 a 6.5 6.5 0 0 1 0 -12" fill="#64748b"/>
  <!-- 搜索框 -->
  <rect x="96" y="128" width="248" height="38" rx="13" fill="#ffffff" stroke="#e5eaf2" filter="url(#soft)"/>
  <circle cx="116" cy="147" r="6" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="121" y1="152" x2="126" y2="157" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <text x="136" y="152" font-size="12" fill="#94a3b8">搜索文档名 / 识别文字</text>
  <!-- 文档卡片 2x2 -->
  <g>
    <rect x="96" y="184" width="118" height="176" rx="14" fill="#ffffff" stroke="#e5eaf2" filter="url(#soft)"/>
    <path d="M 96 198 a 14 14 0 0 1 14 -14 h 90 a 14 14 0 0 1 14 14 v 96 h -118 z" fill="#d9e3f2"/>
    <rect x="116" y="204" width="78" height="6" rx="3" fill="#94a3b8"/>
    <rect x="116" y="218" width="64" height="6" rx="3" fill="#aab6c8"/>
    <rect x="116" y="232" width="78" height="6" rx="3" fill="#aab6c8"/>
    <rect x="116" y="246" width="50" height="6" rx="3" fill="#aab6c8"/>
