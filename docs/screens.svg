    <text x="107" y="333" font-size="9" fill="#7c8698">6 页 · 07-19</text>
    <rect x="107" y="340" width="34" height="14" rx="7" fill="#e7eeff"/>
    <text x="124" y="350" font-size="8.5" fill="#2f6bff" text-anchor="middle">重要</text>
  </g>
  <g>
    <rect x="226" y="184" width="118" height="176" rx="14" fill="#ffffff" stroke="#e5eaf2" filter="url(#soft)"/>
    <path d="M 226 198 a 14 14 0 0 1 14 -14 h 90 a 14 14 0 0 1 14 14 v 96 h -118 z" fill="#e3ddcf"/>
    <rect x="246" y="206" width="78" height="8" rx="4" fill="#8a8577"/>
    <rect x="246" y="224" width="60" height="6" rx="3" fill="#a39d8d"/>
